<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Wristly Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #f3c7bd; color: #6a3fb5; }

        .topbar { background-color: #6a3fb5; color: white; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }

        #alert-bar {
            display: none;
            background-color: red;
            color: white;
            padding: 1.5rem;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            animation: blink 1s infinite;
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .container { max-width: 1000px; margin: 2rem auto; background-color: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(50, 64, 196, 0.2); }
        .flex-row { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: space-between; }
        .card { flex: 1; min-width: 220px; background-color: #f9f9f9; border-radius: 10px; padding: 1rem; border: 1px solid #eee; }
        .value { color: #000; font-size: 1.2rem; font-weight: bold; }
        #chart-container { margin-top: 2rem; background: #f9f9f9; padding: 1rem; border-radius: 10px; height: 300px; }
        .button { padding: 0.8rem; border: none; border-radius: 8px; background-color: #6a3fb5; color: white; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        input, textarea, select { width: 100%; padding: 8px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }

        /* ── XYZ Squares ── */
        .xyz-section { margin-top: 1.5rem; }
        .xyz-label { font-weight: bold; color: #6a3fb5; margin-bottom: 0.75rem; font-size: 1rem; }
        .xyz-squares { display: flex; gap: 1rem; flex-wrap: wrap; }
        .xyz-box {
            flex: 1;
            min-width: 100px;
            background-color: #6a3fb5;
            color: white;
            border-radius: 12px;
            padding: 1.2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 12px rgba(106, 63, 181, 0.3);
        }
        .xyz-box .axis-label { font-size: 0.85rem; opacity: 0.85; margin-bottom: 0.4rem; letter-spacing: 1px; text-transform: uppercase; }
        .xyz-box .axis-value { font-size: 1.5rem; font-weight: bold; }

        /* ── AI Tab ── */
        .ai-tab-wrapper { margin-top: 1.5rem; }
        .tab-header { display: flex; gap: 0; }
        .tab-btn {
            padding: 0.6rem 1.4rem;
            background-color: #e0e7ff;
            color: #6a3fb5;
            border: none;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .tab-btn.active { background-color: #6a3fb5; color: white; opacity: 1; }
        .tab-content {
            background-color: #e0e7ff;
            border-radius: 0 12px 12px 12px;
            padding: 1.2rem 1.5rem;
            display: none;
        }
        .tab-content.active { display: block; }
        .ai-status-label { font-size: 0.85rem; color: #6a3fb5; opacity: 0.7; margin-bottom: 0.3rem; }
        .ai-result { font-size: 1.4rem; font-weight: bold; color: #3a1f80; }

        /* ── Pulse & Motion animations ── */
        .anim-row { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1.5rem; }
        .anim-card {
            flex: 1;
            min-width: 160px;
            background-color: #f9f9f9;
            border-radius: 12px;
            padding: 1.2rem 1rem;
            text-align: center;
            border: 1px solid #eee;
        }
        .anim-card small { display: block; margin-top: 0.6rem; color: #6a3fb5; font-weight: bold; font-size: 0.85rem; }

        .pulse-ring {
            width: 28px;
            height: 28px;
            background-color: red;
            border-radius: 50%;
            margin: 0 auto;
            animation: pulse 1s infinite;
            box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.4);
        }
        @keyframes pulse {
            0%   { transform: scale(1);    box-shadow: 0 0 0 0 rgba(255,0,0,0.4); }
            70%  { transform: scale(1.15); box-shadow: 0 0 0 10px rgba(255,0,0,0); }
            100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(255,0,0,0); }
        }

        .motion-box {
            width: 40px;
            height: 40px;
            background: #6a3fb5;
            border-radius: 10px;
            margin: 0 auto;
            animation: shake 0.5s infinite;
        }
        @keyframes shake {
            0%   { transform: translate(0px, 0px) rotate(0deg); }
            25%  { transform: translate(3px, -3px) rotate(1deg); }
            50%  { transform: translate(-3px, 3px) rotate(-1deg); }
            75%  { transform: translate(3px, 3px) rotate(1deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="alert-bar">🚨 KRITIEKE VAL GEDETECTEERD! 🚨</div>

    <div class="topbar">
        <div><strong>Wristly Monitoring</strong></div>
        <div id="status">Status: <span style="color:lightgreen">Online</span></div>
    </div>

    <div class="container">
        <h1 style="text-align:center">Live Dashboard</h1>

        <!-- Vitals cards -->
        <div class="flex-row">
            <div class="card"><div>Hartslag</div><div class="value" id="heartRate">-- bpm</div></div>
            <div class="card"><div>Zuurstof (SpO2)</div><div class="value" id="oxygen-value">-- %</div></div>
            <div class="card"><div>Temperatuur</div><div class="value" id="temp-value">-- °C</div></div>
        </div>

        <!-- Chart -->
        <div id="chart-container"><canvas id="healthChart"></canvas></div>

        <!-- XYZ Squares -->
        <div class="xyz-section">
            <div class="xyz-label">📐 Bewegingsdata (G-kracht)</div>
            <div class="xyz-squares">
                <div class="xyz-box">
                    <div class="axis-label">X-as</div>
                    <div class="axis-value" id="x-val">--</div>
                </div>
                <div class="xyz-box">
                    <div class="axis-label">Y-as</div>
                    <div class="axis-value" id="y-val">--</div>
                </div>
                <div class="xyz-box">
                    <div class="axis-label">Z-as</div>
                    <div class="axis-value" id="z-val">--</div>
                </div>
            </div>
        </div>

        <!-- AI Tab -->
        <div class="ai-tab-wrapper">
            <div class="tab-header">
                <button class="tab-btn active" onclick="switchTab('ai')">🤖 AI Analyse</button>
            </div>
            <div class="tab-content active" id="tab-ai">
                <div class="ai-status-label">Huidige activiteitsherkenning</div>
                <div class="ai-result" id="prediction-value">Wachten op data...</div>
            </div>
        </div>

        <!-- Pulse & Motion -->
        <div class="anim-row">
            <div class="anim-card">
                <div class="pulse-ring"></div>
                <small>❤️ Pulse Gedetecteerd</small>
            </div>
            <div class="anim-card">
                <div class="motion-box"></div>
                <small>📳 Bewegingsactiviteit</small>
            </div>
        </div>

        <!-- Feedback -->
        <div class="container" style="margin-top: 2rem; border: 1px solid #eee;">
            <h3>Feedback</h3>
            <div id="feedbackForm">
                <input type="text" id="userName" placeholder="Naam">
                <input type="email" id="userEmail" placeholder="Email">
                <textarea id="userFeedback" placeholder="Jouw feedback..."></textarea>
                <select id="rating">
                    <option value="5">5 Sterren</option>
                    <option value="4">4 Sterren</option>
                    <option value="3">3 Sterren</option>
                </select>
                <button class="button" onclick="submitFeedback()">Verstuur</button>
            </div>
            <div id="feedbackMessage"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script>
        const socket = io();

        const ctx = document.getElementById('healthChart').getContext('2d');
        const healthChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Hartslag', data: [], borderColor: '#6a3fb5', fill: false, tension: 0.3 },
                    { label: 'Temperatuur', data: [], borderColor: '#36a2eb', fill: false, tension: 0.3 },
                    { label: 'SpO2', data: [], borderColor: '#e84393', fill: false, tension: 0.3 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        socket.on('mqtt_data', (data) => {
            const time = new Date().toLocaleTimeString();
            if (healthChart.data.labels.length > 15) {
                healthChart.data.labels.shift();
                healthChart.data.datasets[0].data.shift();
                healthChart.data.datasets[1].data.shift();
                healthChart.data.datasets[2].data.shift();
            }
            healthChart.data.labels.push(time);
            healthChart.data.datasets[0].data.push(data.heartRate);
            healthChart.data.datasets[1].data.push(data.temperatureC ?? null);
            healthChart.data.datasets[2].data.push(data.spo2 ?? null);
            healthChart.update();

            document.getElementById('heartRate').textContent = (data.heartRate ?? '--') + ' bpm';
            document.getElementById('oxygen-value').textContent = (data.spo2 ?? '--') + ' %';
            document.getElementById('temp-value').textContent =
                data.temperatureC != null ? data.temperatureC.toFixed(1) + ' °C' : '-- °C';
            document.getElementById('x-val').textContent =
                data.accelX != null ? data.accelX.toFixed(2) : '--';
            document.getElementById('y-val').textContent =
                data.accelY != null ? data.accelY.toFixed(2) : '--';
            document.getElementById('z-val').textContent =
                data.accelZ != null ? data.accelZ.toFixed(2) : '--';
            document.getElementById('prediction-value').textContent =
                data.prediction || 'Wachten op data...';
        });

        socket.on('alert', () => {
            const bar = document.getElementById('alert-bar');
            bar.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => { bar.style.display = 'none'; }, 5000);
        });

        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
        }

        function submitFeedback() {
            const data = {
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                feedback: document.getElementById('userFeedback').value,
                rating: document.getElementById('rating').value
            };
            if (!data.name || !data.email || !data.feedback) {
                alert('Vul alle velden in.');
                return;
            }
            fetch('/submit_feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(res => res.json()).then(() => {
                document.getElementById('feedbackMessage').textContent = "✅ Bedankt voor je feedback!";
                document.getElementById('userName').value = '';
                document.getElementById('userEmail').value = '';
                document.getElementById('userFeedback').value = '';
            }).catch(() => {
                document.getElementById('feedbackMessage').textContent = "❌ Iets ging mis.";
            });
        }
    </script>
</body>
</html>
